# Prim AI Institute — Nginx config for primaiinstitute.com
# Stack: NestJS backend (port 3001) + Vite React static frontend
# SSL: managed by Certbot (run certbot --nginx after placing this file)

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name primaiinstitute.com www.primaiinstitute.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name primaiinstitute.com www.primaiinstitute.com;

    # SSL — Certbot fills these in automatically
    ssl_certificate     /etc/letsencrypt/live/primaiinstitute.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primaiinstitute.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (supplement what NestJS/Helmet already sets)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression for faster page loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── API → NestJS backend (port 3001) ──────────────────────────────────────
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        # Limit request body size (stops large payload attacks)
        client_max_body_size 10M;
    }

    # ── Frontend → Vite static build (no Node.js process) ─────────────────────
    root /var/www/primai/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively, but not the HTML entry point
        location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
