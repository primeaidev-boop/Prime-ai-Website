# Prim AI - HTTPS (post-SSL, mirrors DO source's Certbot-managed pattern)
# Perf additions 2026-07-14: http2, brotli, immutable cache for hashed /assets/,
# no-cache for index.html, gzip tuning. Rollback: primaiinstitute.com.pre-perf-*.bak
server {
    server_name primaiinstitute.com www.primaiinstitute.com;

    # gzip — tuned
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/webp;

    # brotli — better ratios than gzip for text assets, negotiated per Accept-Encoding
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # API → NestJS backend
    location /api {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Uploaded images — served directly from disk (local storage fallback)
    location /uploads/ {
        alias /var/www/primai/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # Vite build assets — filenames are content-hashed, safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA entry point — must always revalidate so deploys reach users immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Frontend — Vite static build
    root  /var/www/primai/frontend/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location ~ /\.  { deny all; }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/primaiinstitute.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/primaiinstitute.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.primaiinstitute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = primaiinstitute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name primaiinstitute.com www.primaiinstitute.com;
    return 404; # managed by Certbot
}
