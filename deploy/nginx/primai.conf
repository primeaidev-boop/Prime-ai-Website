# Prim AI - HTTPS (post-SSL, mirrors DO source's Certbot-managed pattern)
# Perf additions 2026-07-14: http2, brotli, immutable cache for hashed /assets/,
# no-cache for index.html, gzip tuning. Rollback: primaiinstitute.com.pre-perf-*.bak
# SEO additions 2026-07-15: /sitemap.xml proxied to backend; document requests
# for crawler-relevant routes proxied to the backend meta-injection renderer
# (per-route OG/title/JSON-LD for WhatsApp/Facebook previews). Assets untouched.
# If the backend is down these routes fall back to the static SPA shell.
server {
    server_name primaiinstitute.com www.primaiinstitute.com;

    # gzip - tuned
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml image/webp;

    # brotli - better ratios than gzip for text assets, negotiated per Accept-Encoding
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # API → NestJS backend
    location /api {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Uploaded images - served directly from disk (local storage fallback)
    location /uploads/ {
        alias /var/www/primai/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # Vite build assets - filenames are content-hashed, safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA entry point - must always revalidate so deploys reach users immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # llms.txt (llmstxt.org) - exact matches so the SPA fallback and the SEO
    # renderer can never swallow them; always plain text
    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    location = /llms-full.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── SEO: dynamic sitemap + backend-rendered documents ───────────────────
    location = /sitemap.xml {
        proxy_pass       http://127.0.0.1:3001/api/seo/sitemap.xml;
        proxy_set_header Host $host;
    }

    # Crawler-relevant routes: document served by the backend renderer, which
    # returns index.html with per-route meta injected. Same HTML for everyone.
    # error_page fallback keeps the site up (plain SPA shell) if Node is down.
    location = / {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /about {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/about;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /contact {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/contact;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /privacy {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/privacy;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /terms {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/terms;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /refund-policy {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/refund-policy;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location = /dashboard {
        proxy_pass             http://127.0.0.1:3001/api/seo/render/dashboard;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location ^~ /courses {
        proxy_pass             http://127.0.0.1:3001/api/seo/render$uri;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location ^~ /blog {
        proxy_pass             http://127.0.0.1:3001/api/seo/render$uri;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location ^~ /tutorials {
        proxy_pass             http://127.0.0.1:3001/api/seo/render$uri;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location ^~ /projects {
        proxy_pass             http://127.0.0.1:3001/api/seo/render$uri;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }
    location ^~ /programs {
        proxy_pass             http://127.0.0.1:3001/api/seo/render$uri;
        proxy_set_header       Host $host;
        proxy_intercept_errors on;
        error_page 502 503 504 = @spa_fallback;
    }

    # Backend-down fallback: serve the plain SPA shell statically
    location @spa_fallback {
        root /var/www/primai/frontend/dist;
        try_files /index.html =503;
    }

    # Frontend - Vite static build
    root  /var/www/primai/frontend/dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location ~ /\.  { deny all; }

    listen [::]:443 ssl http2 ipv6only=on; # managed by Certbot
    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/primaiinstitute.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/primaiinstitute.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.primaiinstitute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = primaiinstitute.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name primaiinstitute.com www.primaiinstitute.com;
    return 404; # managed by Certbot
}
